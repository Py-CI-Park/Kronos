# STOM 1tick GPU smoke/pilot fine-tuning config.
#
# Purpose:
# - Prove that the exported STOM grouped OHLCV CSV can train on RTX 4080 SUPER.
# - Keep runtime bounded before expanding to larger table/sample counts.
#
# Run:
#   python finetune_csv/train_sequential.py --config finetune_csv/configs/config_stom_1tick_pilot.yaml

data:
  data_path: "finetune_csv/data/stom_1tick_kline.csv"
  dataset_type: "stom_tick"
  group_columns: ["symbol", "session"]
  lookback_window: 300
  predict_window: 60
  max_context: 512
  clip: 5.0
  sample_stride: 20
  max_samples: 4096
  normalize_using: "lookback"
  train_ratio: 0.85
  val_ratio: 0.15
  test_ratio: 0.0

training:
  tokenizer_epochs: 0
  basemodel_epochs: 1
  batch_size: 8
  log_interval: 10
  num_workers: 0
  seed: 42
  tokenizer_learning_rate: 0.0002
  predictor_learning_rate: 0.000001
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.1
  accumulation_steps: 1

model_paths:
  pretrained_tokenizer: "NeoQuasar/Kronos-Tokenizer-base"
  pretrained_predictor: "NeoQuasar/Kronos-small"
  exp_name: "stom_1tick_gpu_pilot_lookback300_pred60"
  base_path: "finetune_csv/finetuned"
  base_save_path: ""
  finetuned_tokenizer: ""
  tokenizer_save_name: "tokenizer"
  basemodel_save_name: "basemodel"

experiment:
  name: "stom_1tick_gpu_pilot"
  description: "Short GPU pilot fine-tune on exported STOM 1tick grouped OHLCV data"
  use_comet: false
  train_tokenizer: false
  train_basemodel: true
  skip_existing: false
  pre_trained_tokenizer: true
  pre_trained_predictor: true

device:
  use_cuda: true
  device_id: 0

distributed:
  use_ddp: false
  backend: "nccl"
